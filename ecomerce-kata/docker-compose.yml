services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testDB
      POSTGRES_USER: testDB
      POSTGRES_PASSWORD: testDB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: testDB
      DB_USERNAME: testDB
      DB_PASSWORD: testDB

volumes:
  pgdata:
